<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>People &mdash; Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
</head>
<body>
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html">Sites</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/cms/journey.html">Journey</a>
    <a href="/cms/audit.html">Audit</a>
    <a href="/signatures/" target="_blank">Signatures</a>
    <a href="/cms/account.html">Account</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <div class="editor-head">
    <h1>People</h1>
    <span class="meta" id="dirty-meta">No unsaved changes</span>
    <span class="meta" id="last-published" style="margin-left:12px;color:var(--ink-2);font-size:12px;"></span>
  </div>

  <div class="section-head">
    <h2>All people</h2>
    <button class="btn add" data-add="people">+ Add person</button>
  </div>
  <div class="table-wrap">
    <table class="cms">
      <thead>
        <tr>
          <th class="img-cell">Photo</th>
          <th>Name</th>
          <th>Role (EN)</th>
          <th>Role (NO)</th>
          <th>Bio</th>
          <th>Email</th>
          <th>Phone</th>
          <th>LinkedIn</th>
          <th class="col-actions">Signature</th>
          <th class="col-pub">Founder</th>
          <th class="col-pub">Live</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="tbody-people"></tbody>
    </table>
  </div>
</main>

<div class="footer-bar">
  <button class="btn" id="btn-reload">Discard changes</button>
  <span class="status-msg" id="status"></span>
  <span class="grow"></span>
  <button class="btn primary" id="btn-save">Save draft</button>
  <button class="btn accent" id="btn-publish">Publish &rarr;</button>
</div>

<div id="modal-root"></div>

<script src="image-picker.js"></script>
<script src="cms.js"></script>
<script>cmsPeople();</script>
</body>
</html>
