<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sections &mdash; Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
<style>
  .sections-grid { display: grid; gap: 18px; }
  .field-card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; }
  .field-card h3 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
  .field-card .key { font-size: 11px; color: var(--ink-2); font-family: ui-monospace, Menlo, monospace; margin: 0 0 14px; }
  .field-langs { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-langs label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-2); font-weight: 600; margin-bottom: 6px; }
  .field-langs input, .field-langs textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13.5px; line-height: 1.5; resize: vertical; }
  .field-langs textarea { min-height: 80px; }
  .field-langs input:focus, .field-langs textarea:focus { border-color: var(--teal); outline: none; box-shadow: 0 0 0 3px rgba(47,102,117,0.12); }
  @media (max-width: 720px) { .field-langs { grid-template-columns: 1fr; } }

  /* Lang toggle */
  .lang-tabs { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-left: 12px; }
  .lang-tabs button { background: #fff; border: 0; padding: 6px 12px; font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--ink-2); }
  .lang-tabs button + button { border-left: 1px solid var(--line); }
  .lang-tabs button.active { background: var(--teal); color: #fff; }

  /* Hide inactive lang */
  body.lang-en .field-lang-no, body.lang-no .field-lang-en { display: none; }
  body.lang-en .field-langs, body.lang-no .field-langs { grid-template-columns: 1fr; }

  /* Page section header */
  .page-section { background: #f8fafb; border: 1px solid var(--line); border-radius: 12px; padding: 6px 18px 18px; margin-top: 28px; }
  .page-section-head { display: flex; align-items: baseline; justify-content: space-between; padding: 12px 0 8px; border-bottom: 1px solid var(--line); margin-bottom: 16px; gap: 14px; flex-wrap: wrap; }
  .page-section-head h2 { margin: 0; font-size: 18px; letter-spacing: -0.01em; }
  .page-section-head .page-path { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--ink-2); margin-left: 8px; font-weight: normal; }
  .page-section-head a.view-link { font-size: 12.5px; font-weight: 600; color: var(--teal); text-decoration: none; }
  .page-section-head a.view-link:hover { text-decoration: underline; }
  .group-heading { margin: 18px 0 8px; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); font-weight: 600; }
</style>
</head>
<body>
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html">Sites</a>
    <a href="/cms/developers.html">Partners</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/cms/journey.html">Journey</a>
    <a href="/cms/audit.html">Audit</a>
    <a href="/signatures/" target="_blank">Signatures</a>
    <a href="/cms/account.html">Account</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <div class="editor-head">
    <h1>Sections</h1>
    <span class="meta" id="dirty-meta">No unsaved changes</span>
    <span class="lang-tabs" role="tablist" aria-label="Language">
      <button type="button" data-lang="both" class="active">Both</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="no">NO</button>
    </span>
  </div>
  <p class="lede">Editable text grouped by the page it appears on. EN renders at <code>/&lt;page&gt;/</code>, NO at <code>/no/&lt;page&gt;/</code>.</p>

  <div class="sections-grid" id="grid"></div>
</main>

<div class="footer-bar">
  <button class="btn" id="btn-reload">Discard changes</button>
  <span class="status-msg" id="status"></span>
  <span class="grow"></span>
  <button class="btn primary" id="btn-save">Save draft</button>
  <button class="btn accent" id="btn-publish">Publish &rarr;</button>
</div>

<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  let data = null, dirty = false;
  const setDirty = (v) => { dirty = v; $('dirty-meta').textContent = v ? 'Unsaved changes' : 'No unsaved changes'; };
  const setStatus = (m, k) => { const e = $('status'); e.textContent = m || ''; e.className = 'status-msg' + (k ? ' ' + k : ''); };
  const escapeAttr = (s) => (s || '').replace(/"/g, '&quot;');
  const escapeText = (s) => (s || '').replace(/</g, '&lt;');

  function render() {
    const grid = $('grid');
    grid.innerHTML = '';
    // Group: page → group → field[]
    const pages = {};
    const pageOrder = [];
    for (const f of data.fields) {
      const p = f.page || '/';
      if (!pages[p]) { pages[p] = { label: f.page_label || p, groups: {}, groupOrder: [] }; pageOrder.push(p); }
      const g = f.group || 'Other';
      if (!pages[p].groups[g]) { pages[p].groups[g] = []; pages[p].groupOrder.push(g); }
      pages[p].groups[g].push(f);
    }
    for (const p of pageOrder) {
      const pg = pages[p];
      const section = document.createElement('section');
      section.className = 'page-section';
      const livePath = p === '*' ? null : p;
      const viewLink = livePath ? `<a class="view-link" href="${livePath}" target="_blank">View live ↗</a>` : '';
      section.innerHTML = `<header class="page-section-head"><h2>${escapeText(pg.label)} <span class="page-path">${escapeText(p)}</span></h2>${viewLink}</header>`;
      for (const g of pg.groupOrder) {
        const gh = document.createElement('div');
        gh.className = 'group-heading';
        gh.textContent = g;
        section.appendChild(gh);
        for (const f of pg.groups[g]) {
          const en = data.values.en[f.key] || '';
          const no = data.values.no[f.key] || '';
          const inputEn = f.type === 'textarea'
            ? `<textarea data-key="${f.key}" data-lang="en">${escapeText(en)}</textarea>`
            : `<input type="text" data-key="${f.key}" data-lang="en" value="${escapeAttr(en)}" />`;
          const inputNo = f.type === 'textarea'
            ? `<textarea data-key="${f.key}" data-lang="no">${escapeText(no)}</textarea>`
            : `<input type="text" data-key="${f.key}" data-lang="no" value="${escapeAttr(no)}" />`;
          const card = document.createElement('div');
          card.className = 'field-card';
          const badge = f.auto ? `<span style="background:#fef3e0;color:#a35c00;font-size:10.5px;padding:2px 8px;border-radius:999px;margin-left:8px;font-weight:600">auto from Sites</span>` : '';
          card.innerHTML = `
            <h3>${escapeText(f.label)}${badge}</h3>
            <p class="key">cms:${f.key}</p>
            <div class="field-langs">
              <div class="field-lang-en"><label>English</label>${inputEn}</div>
              <div class="field-lang-no"><label>Norwegian</label>${inputNo}</div>
            </div>
          `;
          section.appendChild(card);
        }
      }
      grid.appendChild(section);
    }
  }

  function setLang(l) {
    document.body.classList.remove('lang-en', 'lang-no');
    if (l === 'en') document.body.classList.add('lang-en');
    if (l === 'no') document.body.classList.add('lang-no');
    document.querySelectorAll('.lang-tabs button').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
    try { localStorage.setItem('cms-sections-lang', l); } catch (_) {}
  }
  document.querySelectorAll('.lang-tabs button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
  setLang(localStorage.getItem('cms-sections-lang') || 'both');

  function readBack() {
    document.querySelectorAll('[data-key]').forEach(el => {
      data.values[el.dataset.lang][el.dataset.key] = el.value;
    });
  }

  async function load() {
    setStatus('Loading…');
    const r = await fetch('/api/sections');
    if (!r.ok) { setStatus('Load failed', 'err'); return; }
    data = await r.json();
    render();
    setDirty(false);
    setStatus('');
  }

  async function save() {
    readBack();
    setStatus('Saving…');
    const r = await fetch('/api/sections', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    if (!r.ok) { setStatus('Save failed', 'err'); return false; }
    const r2 = await fetch('/api/save/sections', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (!r2.ok) { setStatus('Saved locally; draft commit failed', 'err'); setDirty(false); return true; }
    setDirty(false);
    setStatus('Saved to draft branch', 'ok');
    return true;
  }

  async function publish() {
    if (!confirm('Publish sections? Regenerates index.html + no/index.html and pushes to draft branch.')) return;
    if (!(await save())) return;
    setStatus('Publishing…');
    const r = await fetch('/api/publish/sections', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: 'CMS publish: sections' }) });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) { setStatus('Publish failed: ' + (body.error || r.status), 'err'); return; }
    setStatus('Published to LIVE — both sites redeploying', 'ok');
  }

  document.addEventListener('input', (e) => { if (e.target.matches('[data-key]')) setDirty(true); });
  $('btn-save').addEventListener('click', save);
  $('btn-publish').addEventListener('click', publish);
  $('btn-reload').addEventListener('click', () => { if (dirty && !confirm('Discard unsaved changes?')) return; load(); });
  window.addEventListener('beforeunload', (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

  load();
})();
</script>
</body>
</html>
