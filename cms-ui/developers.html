<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Partners — Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
<style>
  .dev-grid { display: grid; gap: 14px; margin-top: 16px; }
  .dev-row { display: grid; grid-template-columns: 100px 1fr 40px; gap: 14px; align-items: start; padding: 14px; background: #fff; border: 1px solid var(--line); border-radius: 8px; }
  .dev-row .logo-cell { width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; background: #f4f6f8; border-radius: 6px; overflow: hidden; position: relative; cursor: pointer; }
  .dev-row .logo-cell img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .dev-row .logo-cell .placeholder { font-size: 11px; color: var(--ink-2); text-align: center; padding: 6px; }
  .dev-row .logo-cell input[type=file] { display: none; }
  .dev-row .fields { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .dev-row .fields .full { grid-column: 1 / -1; }
  .dev-row label { font-size: 11px; color: var(--ink-2); display: flex; flex-direction: column; gap: 4px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .dev-row input, .dev-row textarea { padding: 8px 10px; font-size: 14px; border: 1px solid var(--line); border-radius: 4px; background: #fff; font-family: inherit; text-transform: none; letter-spacing: normal; font-weight: 400; }
  .dev-row textarea { resize: vertical; min-height: 70px; }
  .dev-row .del { background: transparent; border: none; color: #b3261e; cursor: pointer; font-size: 18px; align-self: start; padding-top: 4px; }
  .toolbar { display: flex; gap: 10px; margin-top: 18px; align-items: center; }
  .add-btn { padding: 10px 18px; background: var(--ink); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .help { font-size: 13px; color: var(--ink-2); margin: 6px 0 0; }
</style>
</head>
<body>
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html">Sites</a>
    <a href="/cms/developers.html" class="active">Partners</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/cms/journey.html">Journey</a>
    <a href="/cms/audit.html">Audit</a>
    <a href="/cms/account.html">Account</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <h1>Partners</h1>
  <p class="lede">Partners and project developers. Logos appear on datacenter cards (when assigned via Sites) and on the public <a href="/partners/" target="_blank">Partners page</a>. Lower <strong>order</strong> numbers display first.</p>
  <div id="dev-grid" class="dev-grid"></div>
  <div class="toolbar">
    <button class="add-btn" id="add">+ Add partner</button>
    <span id="status" style="color:var(--ink-2);font-size:13px;">Auto-saves to draft on edit.</span>
  </div>
</main>
<script>
let state = { developers: [] };
const $ = id => document.getElementById(id);
function escAttr(s) { return String(s ?? '').replace(/"/g, '&quot;'); }
function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let saveTimer = null, saving = false, pendingSave = false;
function scheduleSave() {
  clearTimeout(saveTimer);
  $('status').textContent = 'Editing…';
  saveTimer = setTimeout(doSave, 600);
}
async function doSave() {
  if (saving) { pendingSave = true; return; }
  saving = true;
  $('status').textContent = 'Saving…';
  try {
    const r = await fetch('/api/developers', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      $('status').textContent = 'Save failed: ' + (err.error || r.status);
      saving = false; return;
    }
    $('status').textContent = 'Committing draft…';
    const r2 = await fetch('/api/save/developers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    $('status').textContent = r2.ok ? 'Saved to draft ✓ (publish to push live)' : 'Saved locally; draft commit failed';
  } catch (e) {
    $('status').textContent = 'Save error: ' + e.message;
  }
  saving = false;
  if (pendingSave) { pendingSave = false; doSave(); }
}

function render() {
  $('dev-grid').innerHTML = state.developers.map((d, i) => `
    <div class="dev-row" data-i="${i}">
      <label class="logo-cell" title="Click to upload logo">
        ${d.logo ? `<img src="${escAttr(d.logo)}" alt="" />` : '<span class="placeholder">Click to upload logo</span>'}
        <input type="file" accept="image/*" data-upload="${i}" />
      </label>
      <div class="fields">
        <label>ID (slug)<input data-k="id" value="${escAttr(d.id)}" placeholder="giga-42" /></label>
        <label>Name<input data-k="name" value="${escAttr(d.name)}" placeholder="GIGA-42" /></label>
        <label>Site URL<input data-k="url" value="${escAttr(d.url)}" placeholder="https://…" /></label>
        <label>Order<input data-k="order" type="number" value="${escAttr(d.order ?? '')}" placeholder="1" /></label>
        <label class="full">Tagline (one line)<input data-k="tagline" value="${escAttr(d.tagline)}" placeholder="Power and compute, jointly venturing." /></label>
        <label class="full">Description<textarea data-k="description" placeholder="Longer write-up shown on the Partners page…">${escHtml(d.description)}</textarea></label>
        <label class="full">CTA button label (optional)<input data-k="cta" value="${escAttr(d.cta)}" placeholder="Visit GIGA-42 home →" /></label>
        <label class="full">Logo URL (auto-filled by upload, or paste an external URL)<input data-k="logo" value="${escAttr(d.logo)}" placeholder="/assets/developers/…png" /></label>
      </div>
      <button class="del" data-del="${i}" title="Delete">✕</button>
    </div>
  `).join('');
}

document.addEventListener('input', (e) => {
  const row = e.target.closest('.dev-row');
  if (!row) return;
  const i = +row.dataset.i;
  const k = e.target.dataset.k;
  if (!k) return;
  state.developers[i][k] = k === 'order' ? (e.target.value === '' ? '' : Number(e.target.value)) : e.target.value;
  if (k === 'logo') {
    const cell = row.querySelector('.logo-cell');
    cell.innerHTML = (e.target.value ? `<img src="${escAttr(e.target.value)}" alt="" />` : '<span class="placeholder">Click to upload logo</span>') + `<input type="file" accept="image/*" data-upload="${i}" />`;
  }
  scheduleSave();
});

document.addEventListener('change', async (e) => {
  const file = e.target.matches('[data-upload]') ? e.target.files[0] : null;
  if (!file) return;
  const i = +e.target.dataset.upload;
  const cell = e.target.closest('.logo-cell');
  cell.querySelector('.placeholder')?.replaceWith(Object.assign(document.createElement('span'), { className: 'placeholder', textContent: 'Uploading…' }));
  try {
    const buf = await file.arrayBuffer();
    const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
    const r = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: 'developers', filename: file.name, base64: b64 }) });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'upload failed');
    state.developers[i].logo = '/' + j.path;
    render();
    scheduleSave();
  } catch (err) {
    alert('Upload failed: ' + err.message);
    render();
  }
});

document.addEventListener('click', (e) => {
  const del = e.target.closest('[data-del]');
  if (del) {
    if (!confirm('Delete this partner?')) return;
    state.developers.splice(+del.dataset.del, 1);
    render();
    scheduleSave();
  }
});

$('add').onclick = () => {
  const nextOrder = state.developers.reduce((m, d) => Math.max(m, Number(d.order) || 0), 0) + 1;
  state.developers.push({ id: '', name: '', logo: '', url: '', tagline: '', description: '', cta: '', order: nextOrder });
  render();
};

(async function init() {
  const r = await fetch('/api/developers');
  state = await r.json();
  if (!state.developers) state.developers = [];
  state.developers.sort((a, b) => (Number(a.order) || 999) - (Number(b.order) || 999));
  render();
})();
</script>
</body>
</html>
