<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sites &mdash; Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
</head>
<body>
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html">Sites</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <div class="editor-head">
    <h1>Sites</h1>
    <span class="meta" id="dirty-meta">No unsaved changes</span>
  </div>
  <p class="lede">Pipeline sites shown on the homepage map and on <code>/datacenters/</code>. Status <code>live</code> = active, <code>tbd</code> = disclosed in development.</p>

  <div class="section-head">
    <h2>All sites</h2>
    <button class="btn add" id="btn-add">+ Add site</button>
  </div>
  <div class="table-wrap" style="overflow-x:auto">
    <table class="cms" style="min-width:1200px">
      <thead>
        <tr>
          <th>Name</th>
          <th>Country</th>
          <th>Status</th>
          <th>Power</th>
          <th>Initial MW</th>
          <th>Target MW</th>
          <th>Lat</th>
          <th>Lng</th>
          <th class="img-cell">Image</th>
          <th>Description</th>
          <th class="col-pub">Live</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="footer-bar">
  <button class="btn" id="btn-reload">Discard changes</button>
  <span class="status-msg" id="status"></span>
  <span class="grow"></span>
  <button class="btn primary" id="btn-save">Save draft</button>
  <button class="btn accent" id="btn-publish">Publish &rarr;</button>
</div>

<div id="modal-root"></div>

<script src="image-picker.js"></script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  let data = { sites: [] }, dirty = false;
  const setDirty = (v) => { dirty = v; $('dirty-meta').textContent = v ? 'Unsaved changes' : 'No unsaved changes'; };
  const setStatus = (m, k) => { const e = $('status'); e.textContent = m || ''; e.className = 'status-msg' + (k ? ' ' + k : ''); };
  const escAttr = (s) => (s == null ? '' : String(s)).replace(/"/g, '&quot;');
  const escText = (s) => (s == null ? '' : String(s)).replace(/</g, '&lt;');
  const preview = (s) => (s || '').slice(0, 50) + ((s || '').length > 50 ? '…' : '');

  function row(s, idx) {
    const tr = document.createElement('tr');
    tr.dataset.idx = idx;
    tr.innerHTML = `
      <td><input type="text" data-field="name" value="${escAttr(s.name)}" style="width:140px" /></td>
      <td><input type="text" data-field="country" value="${escAttr(s.country)}" style="width:90px" /></td>
      <td>
        <select data-field="status">
          <option value="live"${s.status==='live'?' selected':''}>live</option>
          <option value="tbd"${s.status==='tbd'?' selected':''}>tbd</option>
        </select>
      </td>
      <td><input type="text" data-field="power" value="${escAttr(s.power)}" placeholder="Hydro / Geothermal / …" style="width:130px" /></td>
      <td><input type="text" data-field="initial_mw" value="${escAttr(s.initial_mw)}" placeholder="50 MW" style="width:90px" /></td>
      <td><input type="text" data-field="target_mw" value="${escAttr(s.target_mw)}" placeholder="200 MW" style="width:90px" /></td>
      <td><input type="number" step="0.0001" data-field="lat" value="${escAttr(s.lat)}" style="width:90px" /></td>
      <td><input type="number" step="0.0001" data-field="lng" value="${escAttr(s.lng)}" style="width:90px" /></td>
      <td class="img-cell"><div class="img-thumb ${s.image ? '' : 'empty'}" data-action="pick-image" title="Click to change">${s.image ? `<img src="/assets/sites/${escAttr(s.image)}" alt="" onerror="this.parentElement.classList.add('empty');this.remove()"/>` : ''}</div></td>
      <td>
        <p class="bio-cell" style="margin:0 0 6px">${escText(preview(s.desc_en))}</p>
        <button class="btn linkish" data-action="edit-desc">Edit EN/NO</button>
      </td>
      <td class="col-pub"><label class="toggle"><input type="checkbox" data-field="published" ${s.published ? 'checked' : ''}/><span class="slider"></span></label></td>
      <td class="col-actions">
        <button class="btn icon" data-action="up">▲</button>
        <button class="btn icon" data-action="down">▼</button>
        <button class="btn danger" data-action="delete">Delete</button>
      </td>
    `;
    return tr;
  }

  function render() {
    const tbody = $('tbody');
    tbody.innerHTML = '';
    data.sites.forEach((s, i) => tbody.appendChild(row(s, i)));
  }

  function readBack() {
    const arr = [];
    $('tbody').querySelectorAll('tr').forEach((tr) => {
      const get = (f) => {
        const el = tr.querySelector(`[data-field="${f}"]`);
        if (!el) return '';
        if (el.type === 'checkbox') return el.checked;
        if (el.type === 'number') return parseFloat(el.value);
        return el.value;
      };
      const original = data.sites[parseInt(tr.dataset.idx, 10)] || {};
      arr.push({
        id: original.id || (get('name') || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''),
        name: get('name'), country: get('country'), status: get('status'),
        power: get('power'), initial_mw: get('initial_mw'), target_mw: get('target_mw'),
        lat: get('lat'), lng: get('lng'),
        image: original.image || '',
        desc_en: original.desc_en || '', desc_no: original.desc_no || '',
        published: get('published'),
      });
    });
    data.sites = arr;
  }

  function openDescModal(idx) {
    readBack();
    const s = data.sites[idx];
    const root = $('modal-root');
    root.innerHTML = `
      <div class="modal-overlay" data-modal-overlay>
        <div class="modal">
          <div class="modal-head">
            <h2>Description &mdash; ${escText(s.name || 'Untitled')}</h2>
            <button class="close" data-modal-close>×</button>
          </div>
          <div class="modal-body">
            <div>
              <label>Description (EN)</label>
              <textarea id="d-en">${escText(s.desc_en)}</textarea>
            </div>
            <div>
              <label>Description (NO)</label>
              <textarea id="d-no">${escText(s.desc_no)}</textarea>
            </div>
          </div>
          <div class="modal-foot">
            <button class="btn" data-modal-close>Cancel</button>
            <button class="btn primary" id="d-apply">Apply</button>
          </div>
        </div>
      </div>
    `;
    const close = () => { root.innerHTML = ''; };
    root.querySelector('[data-modal-overlay]').addEventListener('click', (e) => { if (e.target === e.currentTarget) close(); });
    root.querySelectorAll('[data-modal-close]').forEach(b => b.addEventListener('click', close));
    document.getElementById('d-apply').addEventListener('click', () => {
      data.sites[idx].desc_en = document.getElementById('d-en').value;
      data.sites[idx].desc_no = document.getElementById('d-no').value;
      setDirty(true); render(); close();
    });
  }

  async function load() {
    setStatus('Loading…');
    const r = await fetch('/api/sites');
    if (!r.ok) { setStatus('Load failed', 'err'); return; }
    data = await r.json();
    render(); setDirty(false); setStatus('');
  }
  async function save() {
    readBack();
    setStatus('Saving…');
    const r = await fetch('/api/sites', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) { setStatus('Save failed', 'err'); return false; }
    setDirty(false); setStatus('Draft saved', 'ok'); return true;
  }
  async function publish() {
    if (!confirm('Publish sites? Regenerates home + datacenters maps.')) return;
    if (!(await save())) return;
    setStatus('Publishing…');
    const r = await fetch('/api/publish/sites', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) { setStatus('Publish failed: ' + (body.error || r.status), 'err'); return; }
    setStatus('Published — Coolify is redeploying', 'ok');
  }

  document.addEventListener('input', (e) => { if (e.target.closest('table.cms')) setDirty(true); });
  document.addEventListener('change', (e) => { if (e.target.closest('table.cms')) setDirty(true); });
  document.addEventListener('click', (e) => {
    const t = e.target;
    const tr = t.closest('tr');
    if (t.matches('[data-action="delete"]')) { readBack(); data.sites.splice(parseInt(tr.dataset.idx,10), 1); render(); setDirty(true); }
    else if (t.matches('[data-action="up"]') || t.matches('[data-action="down"]')) {
      const idx = parseInt(tr.dataset.idx, 10);
      const newIdx = t.matches('[data-action="up"]') ? idx-1 : idx+1;
      if (newIdx < 0 || newIdx >= data.sites.length) return;
      readBack();
      const [m] = data.sites.splice(idx, 1);
      data.sites.splice(newIdx, 0, m); render(); setDirty(true);
    } else if (t.matches('[data-action="edit-desc"]')) {
      openDescModal(parseInt(tr.dataset.idx, 10));
    } else if (t.closest('[data-action="pick-image"]')) {
      const idx = parseInt(tr.dataset.idx, 10);
      readBack();
      window.openImagePicker({
        folder: 'sites',
        current: data.sites[idx].image ? 'assets/sites/' + data.sites[idx].image : '',
        onPick: (path) => { data.sites[idx].image = (path || '').replace(/^assets\/sites\//, ''); setDirty(true); render(); },
      });
    }
  });
  $('btn-add').addEventListener('click', () => {
    readBack();
    data.sites.push({ id: '', name: 'New site', country: 'Norway', status: 'tbd', power: '', initial_mw: '', target_mw: '', lat: 65, lng: 14, image: '', desc_en: '', desc_no: '', published: false });
    render(); setDirty(true);
  });
  $('btn-save').addEventListener('click', save);
  $('btn-publish').addEventListener('click', publish);
  $('btn-reload').addEventListener('click', () => { if (dirty && !confirm('Discard?')) return; load(); });
  window.addEventListener('beforeunload', (e) => { if (dirty) { e.preventDefault(); e.returnValue=''; } });
  load();
})();
</script>
</body>
</html>
