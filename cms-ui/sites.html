<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sites &mdash; Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
<style>
  table.sites-grid { border-collapse: separate; border-spacing: 0; min-width: 100%; }
  table.sites-grid th, table.sites-grid td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); padding: 8px 10px; vertical-align: top; background: #fff; }
  table.sites-grid th.field-label { background: #fafbfc; font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); text-align: left; position: sticky; left: 0; z-index: 2; min-width: 130px; }
  table.sites-grid td.field-label { background: #fafbfc; font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); position: sticky; left: 0; z-index: 1; min-width: 130px; }
  table.sites-grid th.site-col, table.sites-grid td.site-col { min-width: 220px; max-width: 280px; }
  .site-card { padding: 0; }
  .site-card .actions { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--line); background: #fafbfc; align-items: center; }
  .site-card .actions .btn.icon { padding: 3px 6px; font-size: 11px; }
  .site-card .actions .grow { flex: 1; }
  .site-card .img-wrap { aspect-ratio: 16/10; background: #eef0f2; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--ink-2); font-size: 12px; }
  .site-card .img-wrap:hover { background: #e5e8eb; }
  .site-card .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .site-card .img-wrap.empty::after { content: "+ image"; color: var(--ink-2); }
  table.sites-grid input[type=text], table.sites-grid input[type=number], table.sites-grid select, table.sites-grid textarea { width: 100%; border: 1px solid transparent; padding: 5px 7px; border-radius: 6px; font: inherit; font-size: 13px; background: transparent; }
  table.sites-grid input:focus, table.sites-grid select:focus, table.sites-grid textarea:focus { border-color: var(--teal); background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(47,102,117,0.12); }
  table.sites-grid textarea { min-height: 56px; resize: vertical; }
  .add-col-btn { padding: 8px 12px; }
</style>
</head>
<body>
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html">Sites</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <div class="editor-head">
    <h1>Sites</h1>
    <span class="meta" id="dirty-meta">No unsaved changes</span>
  </div>
  <p class="lede">Pipeline sites — fields down the left, one column per site. Click an image to upload. Drag the &blacktriangle;/&blacktriangledown; buttons in a column header to reorder.</p>

  <div id="totals" style="display:flex;gap:24px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:14px;font-size:13.5px"></div>

  <div class="section-head">
    <h2>All sites</h2>
    <button class="btn add" id="btn-add">+ Add site</button>
  </div>
  <div class="table-wrap" style="overflow-x:auto">
    <table class="sites-grid" id="grid"></table>
  </div>
</main>

<div class="footer-bar">
  <button class="btn" id="btn-reload">Discard changes</button>
  <span class="status-msg" id="status"></span>
  <span class="grow"></span>
  <button class="btn primary" id="btn-save">Save draft</button>
  <button class="btn accent" id="btn-publish">Publish &rarr;</button>
</div>

<div id="modal-root"></div>

<script src="image-picker.js"></script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  let data = { sites: [] }, dirty = false;
  const setDirty = (v) => { dirty = v; $('dirty-meta').textContent = v ? 'Unsaved changes' : 'No unsaved changes'; };
  const setStatus = (m, k) => { const e = $('status'); e.textContent = m || ''; e.className = 'status-msg' + (k ? ' ' + k : ''); };
  const escAttr = (s) => (s == null ? '' : String(s)).replace(/"/g, '&quot;');
  const escText = (s) => (s == null ? '' : String(s)).replace(/</g, '&lt;');

  const FIELDS = [
    { key: 'name', label: 'Name', type: 'text' },
    { key: 'country', label: 'Country', type: 'text' },
    { key: 'status', label: 'Status', type: 'select', options: ['live', 'tbd'] },
    { key: 'power', label: 'Power', type: 'text', placeholder: 'Hydro / Geothermal / …' },
    { key: 'initial_mw', label: 'Initial MW', type: 'text', placeholder: '50 MW' },
    { key: 'target_mw', label: 'Target MW', type: 'text', placeholder: '200 MW' },
    { key: 'lat', label: 'Latitude', type: 'number' },
    { key: 'lng', label: 'Longitude', type: 'number' },
    { key: 'desc_en', label: 'Description (EN)', type: 'textarea' },
    { key: 'desc_no', label: 'Description (NO)', type: 'textarea' },
    { key: 'published', label: 'Live', type: 'toggle' },
  ];

  function siteHeader(s, idx, total) {
    const imgUrl = s.image ? `/assets/sites/${escAttr(s.image)}` : '';
    return `
      <th class="site-col">
        <div class="site-card">
          <div class="actions">
            <button class="btn icon" data-action="up" data-idx="${idx}" ${idx===0?'disabled':''} title="Move left">▲</button>
            <button class="btn icon" data-action="down" data-idx="${idx}" ${idx===total-1?'disabled':''} title="Move right">▼</button>
            <span class="grow"></span>
            <button class="btn danger" data-action="delete" data-idx="${idx}" title="Delete site">×</button>
          </div>
          <div class="img-wrap ${s.image ? '' : 'empty'}" data-action="pick-image" data-idx="${idx}" title="Click to upload">
            ${s.image ? `<img src="${imgUrl}" alt="" onerror="this.parentElement.classList.add('empty');this.remove()"/>` : ''}
          </div>
        </div>
      </th>
    `;
  }

  function fieldCell(f, s, idx) {
    const v = s[f.key];
    if (f.type === 'textarea') return `<td class="site-col"><textarea data-key="${f.key}" data-idx="${idx}">${escText(v)}</textarea></td>`;
    if (f.type === 'select') return `<td class="site-col"><select data-key="${f.key}" data-idx="${idx}">${f.options.map(o => `<option value="${o}"${v===o?' selected':''}>${o}</option>`).join('')}</select></td>`;
    if (f.type === 'toggle') return `<td class="site-col"><label class="toggle"><input type="checkbox" data-key="${f.key}" data-idx="${idx}" ${v?'checked':''}/><span class="slider"></span></label></td>`;
    if (f.type === 'number') return `<td class="site-col"><input type="number" step="0.0001" data-key="${f.key}" data-idx="${idx}" value="${escAttr(v)}" /></td>`;
    return `<td class="site-col"><input type="text" data-key="${f.key}" data-idx="${idx}" value="${escAttr(v)}" placeholder="${escAttr(f.placeholder || '')}" /></td>`;
  }

  function parseMW(s) { const m = String(s || '').match(/[\d.]+/); return m ? parseFloat(m[0]) : 0; }
  function fmt(n) { return Number.isInteger(n) ? n.toString() : n.toFixed(1); }

  function renderTotals() {
    const live = data.sites.filter(s => s.published && s.status === 'live');
    const tbd = data.sites.filter(s => s.published && s.status === 'tbd');
    const liveInitial = live.reduce((a, s) => a + parseMW(s.initial_mw), 0);
    const liveTarget = live.reduce((a, s) => a + parseMW(s.target_mw), 0);
    const tbdTarget = tbd.reduce((a, s) => a + parseMW(s.target_mw), 0);
    const allTarget = liveTarget + tbdTarget;
    $('totals').innerHTML = `
      <div><strong>${live.length}</strong> live sites</div>
      <div><strong>${tbd.length}</strong> disclosed (tbd)</div>
      <div>Live initial: <strong>${fmt(liveInitial)} MW</strong></div>
      <div>Live target: <strong>${fmt(liveTarget)} MW</strong></div>
      <div>Total pipeline target: <strong>${fmt(allTarget)} MW</strong> (${(allTarget/1000).toFixed(2)} GW)</div>
    `;
  }

  function render() {
    const total = data.sites.length;
    const headers = data.sites.map((s, i) => siteHeader(s, i, total)).join('');
    const rows = FIELDS.map(f => `
      <tr>
        <td class="field-label">${escText(f.label)}</td>
        ${data.sites.map((s, i) => fieldCell(f, s, i)).join('')}
      </tr>
    `).join('');
    $('grid').innerHTML = `
      <thead>
        <tr>
          <th class="field-label"></th>
          ${headers}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    `;
    renderTotals();
  }

  function readBack() {
    document.querySelectorAll('[data-key][data-idx]').forEach(el => {
      const i = parseInt(el.dataset.idx, 10);
      const k = el.dataset.key;
      if (!data.sites[i]) return;
      let v;
      if (el.type === 'checkbox') v = el.checked;
      else if (el.type === 'number') v = parseFloat(el.value);
      else v = el.value;
      data.sites[i][k] = v;
    });
  }

  async function load() {
    setStatus('Loading…');
    const r = await fetch('/api/sites');
    if (!r.ok) { setStatus('Load failed', 'err'); return; }
    data = await r.json(); render(); setDirty(false); setStatus('');
  }
  async function save() {
    readBack();
    setStatus('Saving…');
    const r = await fetch('/api/sites', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) { setStatus('Save failed', 'err'); return false; }
    setDirty(false); setStatus('Draft saved', 'ok'); return true;
  }
  async function publish() {
    if (!confirm('Publish sites? Regenerates home + datacenters maps and hero stats.')) return;
    if (!(await save())) return;
    setStatus('Publishing…');
    const r = await fetch('/api/publish/sites', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) { setStatus('Publish failed: ' + (body.error || r.status), 'err'); return; }
    setStatus('Published — Coolify is redeploying', 'ok');
  }

  document.addEventListener('input', (e) => {
    const el = e.target;
    if (!el.matches('[data-key][data-idx]')) return;
    setDirty(true);
    const i = parseInt(el.dataset.idx, 10);
    const k = el.dataset.key;
    const v = el.type === 'checkbox' ? el.checked : el.type === 'number' ? parseFloat(el.value) : el.value;
    if (data.sites[i]) data.sites[i][k] = v;
    if (k === 'initial_mw' || k === 'target_mw') renderTotals();
  });
  document.addEventListener('change', (e) => {
    const el = e.target;
    if (!el.matches('[data-key][data-idx]')) return;
    setDirty(true);
    const i = parseInt(el.dataset.idx, 10);
    const k = el.dataset.key;
    const v = el.type === 'checkbox' ? el.checked : el.value;
    if (data.sites[i]) data.sites[i][k] = v;
    if (k === 'status' || k === 'published') renderTotals();
  });

  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    const idx = parseInt(t.dataset.idx, 10);
    if (action === 'delete') {
      if (!confirm('Delete this site?')) return;
      readBack(); data.sites.splice(idx, 1); render(); setDirty(true);
    } else if (action === 'up' || action === 'down') {
      const ni = action === 'up' ? idx - 1 : idx + 1;
      if (ni < 0 || ni >= data.sites.length) return;
      readBack();
      const [m] = data.sites.splice(idx, 1);
      data.sites.splice(ni, 0, m);
      render(); setDirty(true);
    } else if (action === 'pick-image') {
      readBack();
      window.openImagePicker({
        folder: 'sites',
        current: data.sites[idx].image ? 'assets/sites/' + data.sites[idx].image : '',
        onPick: (path) => { data.sites[idx].image = (path || '').replace(/^assets\/sites\//, ''); setDirty(true); render(); },
      });
    }
  });

  $('btn-add').addEventListener('click', () => {
    readBack();
    data.sites.push({ id: '', name: 'New site', country: 'Norway', status: 'tbd', power: '', initial_mw: '', target_mw: '', lat: 65, lng: 14, image: '', desc_en: '', desc_no: '', published: false });
    render(); setDirty(true);
  });
  $('btn-save').addEventListener('click', save);
  $('btn-publish').addEventListener('click', publish);
  $('btn-reload').addEventListener('click', () => { if (dirty && !confirm('Discard?')) return; load(); });
  window.addEventListener('beforeunload', (e) => { if (dirty) { e.preventDefault(); e.returnValue=''; } });
  load();
})();
</script>
</body>
</html>
