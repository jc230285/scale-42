<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sites &mdash; Scale42 CMS</title>
<link rel="stylesheet" href="cms.css" />
<style>
  .toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .toolbar .grow { flex:1; }
  .scroll-wrap { overflow:auto; background: #fff; }
  table.grid { border-collapse: separate; border-spacing: 0; }
  table.grid th, table.grid td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); padding: 0; vertical-align: top; background: #fff; }
  table.grid .label-col { background: #fafbfc; position: sticky; left: 0; z-index: 5; min-width: 200px; max-width: 200px; }
  table.grid .label-col .field-label { padding: 7px 10px; font-size: 12px; font-weight: 600; color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  table.grid .label-col .field-label .dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
  table.grid .label-col .field-label .dot.public { background: var(--teal); }
  table.grid .label-col .field-label .dot.internal { background: #cfd5d9; }
  table.grid .group-row td { background: #eef0f2; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; color: var(--ink); cursor: pointer; user-select: none; position: sticky; left: 0; z-index: 4; }
  table.grid .group-row td::before { content: '▾'; margin-right: 8px; display: inline-block; transition: transform 0.1s; }
  table.grid .group-row.collapsed td::before { transform: rotate(-90deg); }
  table.grid .group-row .group-internal-tag { background: #fef3e0; color: #a35c00; padding: 1px 7px; border-radius: 999px; font-size: 10px; margin-left: 8px; font-weight: 600; }
  table.grid tr.internal-field td { background: #fdecec; }
  table.grid tr.internal-field td.label-col { background: #fbdbdb; }
  table.grid tr.internal-field td.label-col .field-label { color: #8a1c1c; }
  .strat-pill { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; background: #6b7780; }
  .strat-going-to-3rd-party- { background: #b9923a; }
  .strat-giga-42-responsibility { background: #2f6675; }
  .strat-development-focus { background: #2e7d32; }
  .strat-later-stage-project { background: #5b6e7d; }
  .strat-bin-the-project { background: #b3261e; }
  .strat-who-the-fuck-knows { background: #7e57c2; }
  table.grid .site-col { min-width: 240px; max-width: 280px; }
  table.grid th.site-col.not-public, table.grid td.not-public { background: #fef2f2; }
  table.grid th.site-col.not-public { box-shadow: inset 0 -3px 0 #dc2626; }
  table.grid thead .header-cell { padding: 8px; background: #fafbfc; position: sticky; top: 0; z-index: 6; }
  table.grid thead .header-cell .reorder { display: flex; gap: 2px; justify-content: center; margin-bottom: 4px; }
  table.grid thead .header-cell .reorder button { background: transparent; border: 1px solid var(--line); border-radius: 4px; cursor: pointer; padding: 1px 6px; font-size: 10px; color: var(--ink-2); }
  table.grid thead .header-cell .reorder button:hover { color: var(--ink); border-color: var(--ink); }
  table.grid thead .header-cell .reorder button.del { margin-left: auto; color: #b3261e; border-color: #f3c1bd; }
  table.grid thead .header-cell .img-wrap { aspect-ratio: 16/10; background: #eef0f2; cursor: pointer; border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--ink-2); font-size: 11px; margin-bottom: 6px; }
  table.grid thead .header-cell .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  table.grid thead .header-cell .name { font-weight: 600; font-size: 13px; }
  table.grid thead .header-cell .meta { font-size: 11px; color: var(--ink-2); margin-top: 2px; display: flex; gap: 4px; align-items: center; }
  table.grid thead .header-cell .pill { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #fff; }
  table.grid thead .header-cell .pill.live { background: var(--teal); }
  table.grid thead .header-cell .pill.tbd { background: #b8a07a; }
  table.grid thead .header-cell .pill.sold { background: #33752f; }
  table.grid thead .header-cell .pill.draft { background: #b3b8be; }

  table.grid tbody td { padding: 4px 6px; }
  table.grid input[type=text], table.grid input[type=number], table.grid select, table.grid textarea {
    width: 100%; border: 1px solid transparent; padding: 4px 6px; border-radius: 4px;
    font: inherit; font-size: 12.5px; background: transparent;
  }
  table.grid input:focus, table.grid select:focus, table.grid textarea:focus { border-color: var(--teal); background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(47,102,117,0.12); }
  table.grid textarea { min-height: 50px; resize: vertical; line-height: 1.35; }
  table.grid .toggle-cell { display: flex; align-items: center; padding: 8px; }
  table.grid .complex-cell { padding: 8px; font-size: 11px; color: var(--ink-2); cursor: pointer; }
  table.grid .complex-cell:hover { background: #fafbfc; }
  table.grid .complex-cell .summary { font-style: italic; }

  .ms-row { display: grid; grid-template-columns: 2fr 1fr 1fr 80px 30px; gap: 8px; align-items: center; padding: 6px 0; border-top: 1px dashed #e5e8eb; }
  .ms-row:first-child { border-top: none; }
</style>
</head>
<body class="sites-fullscreen">
<header class="cms-nav">
  <a class="cms-brand" href="/cms/">Scale42 CMS</a>
  <nav>
    <a href="/cms/people.html">People</a>
    <a href="/cms/sites.html" class="active">Sites</a>
    <a href="/cms/news.html">News</a>
    <a href="/cms/sections.html">Sections</a>
    <a href="/cms/journey.html">Journey</a>
    <a href="/cms/audit.html">Audit</a>
    <a href="/signatures/" target="_blank">Signatures</a>
    <a href="/cms/account.html">Account</a>
    <a href="/" target="_blank">View site &rarr;</a>
  </nav>
</header>
<main class="cms-main">
  <div class="editor-head">
    <h1>Sites</h1>
    <span class="meta" id="dirty-meta">No unsaved changes</span>
    <span class="meta" id="last-published" style="color:var(--ink-2);font-size:12px;"></span>
    <span class="grow" style="flex:1"></span>
    <label style="display:flex;gap:6px;align-items:center;font-size:13px;color:var(--ink-2);"><input type="checkbox" id="hide-internal"/> Hide internal fields</label>
    <button class="btn add" id="btn-add">+ Add site</button>
  </div>

  <div class="scroll-wrap">
    <table class="grid" id="grid"></table>
  </div>
</main>

<div class="footer-bar">
  <button class="btn" id="btn-reload">Discard changes</button>
  <div id="totals" class="footer-totals"></div>
  <span class="status-msg" id="status"></span>
  <span class="grow"></span>
  <button class="btn primary" id="btn-save">Save draft</button>
  <button class="btn accent" id="btn-publish">Publish &rarr;</button>
</div>

<div id="modal-root"></div>

<script src="image-picker.js"></script>
<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  let data = { sites: [] }, schema = null, dirty = false;
  let hideInternal = localStorage.getItem('hideInternal') === null ? true : (localStorage.getItem('hideInternal') === '1');
  let collapsedGroups = JSON.parse(localStorage.getItem('collapsedGroups') || '{}');

  const setDirty = (v) => { dirty = v; $('dirty-meta').textContent = v ? 'Unsaved changes' : 'No unsaved changes'; };
  const setStatus = (m, k) => { const e = $('status'); e.textContent = m || ''; e.className = 'status-msg' + (k ? ' ' + k : ''); };
  const escAttr = (s) => (s == null ? '' : String(s)).replace(/"/g, '&quot;');
  const escText = (s) => (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
  const parseMW = (s) => { const m = String(s || '').match(/[\d.]+/); return m ? parseFloat(m[0]) : 0; };

  $('hide-internal').checked = hideInternal;
  $('hide-internal').addEventListener('change', (e) => {
    hideInternal = e.target.checked;
    localStorage.setItem('hideInternal', hideInternal ? '1' : '0');
    readBack(); render();
  });

  function renderTotals() {
    const sites = data.sites;
    const live = sites.filter(s => s.published);
    const total = live.filter(s => s.status !== 'sold').reduce((a, s) => a + parseMW(s.max_capacity_mw || s.target_mw), 0);
    const liveMW = live.filter(s => s.status === 'live').reduce((a, s) => a + parseMW(s.max_capacity_mw || s.target_mw), 0);
    const soldMW = live.filter(s => s.status === 'sold').reduce((a, s) => a + parseMW(s.max_capacity_mw || s.target_mw), 0);
    const countries = new Set(live.map(s => s.country).filter(Boolean)).size;
    $('totals').innerHTML = `
      <div><strong>${live.length}</strong> public · <strong>${sites.length - live.length}</strong> draft</div>
      <div><strong>${total} MW</strong> active pipeline (excl. sold)</div>
      <div><strong>${liveMW} MW</strong> in dev · <strong>${soldMW} MW</strong> sold</div>
      <div><strong>${countries}</strong> countries</div>
    `;
  }

  function fieldDot(f) {
    return `<span class="dot ${f.public ? 'public' : 'internal'}" title="${f.public ? 'Public' : 'Internal only'}"></span>`;
  }

  function renderCell(site, sIdx, f) {
    const v = site[f.key];
    const dataAttrs = `data-key="${f.key}" data-type="${f.type}" data-idx="${sIdx}"`;
    if (f.type === 'textarea' || f.key.startsWith('desc_')) {
      return `<textarea ${dataAttrs}>${escText(v)}</textarea>`;
    }
    if (f.type === 'select') {
      const opts = (f.options || []).map(o => `<option value="${escAttr(o)}"${v === o ? ' selected' : ''}>${escText(o)}</option>`).join('');
      return `<select ${dataAttrs}><option value=""></option>${opts}</select>`;
    }
    if (f.type === 'combo') {
      const listId = `dl-${f.key}`;
      let options = f.options || [];
      if (f.sortByUsage) {
        const usage = new Map();
        for (const s of data.sites) { const x = s[f.key]; if (x) usage.set(x, (usage.get(x) || 0) + 1); }
        const used = [...usage.entries()].sort((a, b) => b[1] - a[1]).map(e => e[0]);
        const rest = options.filter(o => !usage.has(o));
        const extras = used.filter(u => !options.includes(u));
        options = [...used, ...extras, ...rest];
      }
      const opts = options.map(o => `<option value="${escAttr(o)}"></option>`).join('');
      return `<input type="text" list="${listId}" ${dataAttrs} value="${escAttr(v)}" /><datalist id="${listId}">${opts}</datalist>`;
    }
    if (f.type === 'toggle') {
      return `<div class="toggle-cell"><input type="checkbox" ${dataAttrs} ${v ? 'checked' : ''} /></div>`;
    }
    if (f.type === 'number') {
      return `<input type="number" step="any" ${dataAttrs} value="${escAttr(v)}" />`;
    }
    if (f.type === 'tags') {
      const arr = Array.isArray(v) ? v.join(', ') : (v || '');
      return `<input type="text" ${dataAttrs} value="${escAttr(arr)}" placeholder="comma, separated" />`;
    }
    if (f.type === 'study' || f.type === 'permit') {
      const summary = v && (v.status || v.date) ? `${v.status || ''} ${v.date ? '· ' + v.date : ''}` : '— click to edit';
      return `<div class="complex-cell" data-complex="${f.type}" data-cidx="${sIdx}" data-ckey="${f.key}"><span class="summary">${escText(summary)}</span></div>`;
    }
    if (f.type === 'milestones') {
      const n = Array.isArray(v) ? v.length : 0;
      return `<div class="complex-cell" data-complex="milestones" data-cidx="${sIdx}" data-ckey="${f.key}"><span class="summary">${n} milestone${n === 1 ? '' : 's'} — click to edit</span></div>`;
    }
    if (f.type === 'links') {
      const n = Array.isArray(v) ? v.length : 0;
      return `<div class="complex-cell" data-complex="links" data-cidx="${sIdx}" data-ckey="${f.key}"><span class="summary">${n} link${n === 1 ? '' : 's'} — click to edit</span></div>`;
    }
    if (f.type === 'table') {
      const n = Array.isArray(v) ? v.length : 0;
      return `<div class="complex-cell" data-complex="table" data-cidx="${sIdx}" data-ckey="${f.key}" data-cols='${escAttr(JSON.stringify(f.columns || []))}'><span class="summary">${n} row${n === 1 ? '' : 's'} — click to edit</span></div>`;
    }
    if (f.type === 'image') {
      return ''; // image is in column header
    }
    return `<input type="text" ${dataAttrs} value="${escAttr(v)}"${f.readonly ? ' readonly' : ''} />`;
  }

  function siteHeader(site, idx) {
    const status = site.status || 'tbd';
    const pillCls = site.published ? status : 'draft';
    const pillTxt = site.published ? status : 'draft';
    // Tolerate both bare filenames ("foo.jpg") and full paths ("assets/sites/foo.jpg" or "/assets/sites/foo.jpg")
    const imgSrc = site.image
      ? (/^\/?assets\//.test(site.image) ? '/' + site.image.replace(/^\/+/, '') : '/assets/sites/' + site.image)
      : null;
    const img = imgSrc ? `<img src="${escAttr(imgSrc)}" />` : '+ image';
    return `
      <div class="reorder">
        <button data-act="up" data-ridx="${idx}" title="Move left">◀</button>
        <button data-act="down" data-ridx="${idx}" title="Move right">▶</button>
        <button data-act="del" data-ridx="${idx}" class="del" title="Delete">✕</button>
      </div>
      <div class="img-wrap" data-img-idx="${idx}">${img}</div>
      <div class="name">${escText(site.name || '(unnamed)')}</div>
      <div class="meta"><span class="pill ${pillCls}">${escText(pillTxt)}</span><span>${escText(site.country || '')}</span></div>
      ${site.strategic_status ? `<div class="strat-pill strat-${escAttr(site.strategic_status.replace(/[^a-z0-9]/gi,'-').toLowerCase())}" title="Strategic status">${escText(site.strategic_status)}</div>` : ''}
    `;
  }

  function render() {
    const grid = $('grid');
    if (!schema) { grid.innerHTML = ''; return; }

    let html = '<thead><tr><th class="label-col header-cell" style="z-index:7;"><div style="padding:8px;"><strong>Field</strong></div></th>';
    data.sites.forEach((s, i) => {
      const np = s.published ? '' : ' not-public';
      html += `<th class="site-col header-cell${np}">${siteHeader(s, i)}</th>`;
    });
    html += '</tr></thead><tbody>';

    const fieldsByGroup = {};
    for (const f of schema.fields) {
      if (f.type === 'image') continue;
      if (hideInternal && !f.public) continue;
      if (!fieldsByGroup[f.group]) fieldsByGroup[f.group] = [];
      fieldsByGroup[f.group].push(f);
    }

    for (const g of schema.groups) {
      const fields = fieldsByGroup[g.key];
      if (!fields || !fields.length) continue;
      const isCollapsed = collapsedGroups[g.key];
      const internalTag = g.internalOnly ? `<span class="group-internal-tag">internal</span>` : '';
      html += `<tr class="group-row ${isCollapsed ? 'collapsed' : ''}" data-group="${g.key}">
        <td colspan="${data.sites.length + 1}">${escText(g.label)}${internalTag}</td>
      </tr>`;
      if (isCollapsed) continue;
      for (const f of fields) {
        const rowCls = f.public ? 'field-row' : 'field-row internal-field';
        html += `<tr class="${rowCls}">`;
        html += `<td class="label-col"><div class="field-label">${fieldDot(f)} ${escText(f.label)}</div></td>`;
        data.sites.forEach((s, i) => {
          html += `<td>${renderCell(s, i, f)}</td>`;
        });
        html += '</tr>';
      }
    }
    html += '</tbody>';
    grid.innerHTML = html;
    renderTotals();
  }

  function readBack() {
    document.querySelectorAll('#grid [data-key][data-idx]').forEach(el => {
      const i = parseInt(el.dataset.idx, 10);
      const k = el.dataset.key;
      const t = el.dataset.type;
      if (!data.sites[i]) return;
      let v;
      if (el.type === 'checkbox') v = el.checked;
      else if (t === 'tags') v = el.value.split(',').map(s => s.trim()).filter(Boolean);
      else if (el.type === 'number') v = el.value === '' ? null : parseFloat(el.value);
      else v = el.value;
      data.sites[i][k] = v;
    });
  }

  function openComplexModal(idx, key, type, cols) {
    readBack();
    const site = data.sites[idx];
    const root = $('modal-root');
    let body = '';
    if (type === 'milestones') {
      const arr = Array.isArray(site[key]) ? site[key] : (site[key] = []);
      body = `<div>
        <div id="ms-rows">${arr.map((m, i) => `
          <div class="ms-row" data-mi="${i}">
            <input data-mk="name" placeholder="name" value="${escAttr(m.name)}" />
            <input data-mk="target_date" placeholder="YYYY-MM" value="${escAttr(m.target_date)}" />
            <input data-mk="status" placeholder="status" value="${escAttr(m.status)}" />
            <label style="display:flex;gap:6px;align-items:center;font-size:11px;"><input type="checkbox" data-mk="public" ${m.public ? 'checked' : ''} /> Public</label>
            <button type="button" data-mrm="${i}" style="background:transparent;border:none;color:#b3261e;cursor:pointer;font-size:14px;">✕</button>
          </div>`).join('')}</div>
        <button class="btn" id="ms-add" style="margin-top:8px;">+ Add milestone</button>
      </div>`;
    } else if (type === 'links') {
      const arr = Array.isArray(site[key]) ? site[key] : (site[key] = []);
      body = `<div>
        <div id="lk-rows">${arr.map((l, i) => `
          <div class="lk-row" data-li="${i}" style="display:grid;grid-template-columns:1fr 2fr 30px;gap:8px;align-items:center;border-top:1px dashed #e5e8eb;padding-top:6px;">
            <input data-lk="title" placeholder="Title" value="${escAttr(l.title)}" />
            <input data-lk="url" placeholder="https://..." value="${escAttr(l.url)}" />
            <button type="button" data-lrm="${i}" style="background:transparent;border:none;color:#b3261e;cursor:pointer;font-size:14px;">✕</button>
          </div>`).join('')}</div>
        <button class="btn" id="lk-add" style="margin-top:8px;">+ Add link</button>
      </div>`;
    } else if (type === 'study' || type === 'permit') {
      const o = (site[key] && typeof site[key] === 'object') ? site[key] : {};
      body = `<div style="display:grid;gap:10px;">
        <label>Status<input data-sub="status" value="${escAttr(o.status)}" /></label>
        <label>Date<input data-sub="date" value="${escAttr(o.date)}" placeholder="YYYY-MM-DD" /></label>
        ${type === 'study' ? `<label>Link<input data-sub="link" value="${escAttr(o.link)}" /></label>` : ''}
      </div>`;
    } else if (type === 'table') {
      const arr = Array.isArray(site[key]) ? site[key] : (site[key] = []);
      const colArr = JSON.parse(cols || '[]');
      body = `<div>
        <div id="t-rows">${arr.map((r, i) => `
          <div style="display:grid;grid-template-columns:repeat(${colArr.length}, 1fr) 30px;gap:8px;align-items:center;border-top:1px dashed #e5e8eb;padding-top:6px;" data-ri="${i}">
            ${colArr.map(c => `<input data-tk="${c}" placeholder="${c}" value="${escAttr(r[c])}" />`).join('')}
            <button type="button" data-trm="${i}" style="background:transparent;border:none;color:#b3261e;cursor:pointer;font-size:14px;">✕</button>
          </div>`).join('')}</div>
        <button class="btn" id="t-add" style="margin-top:8px;">+ Add row</button>
      </div>`;
    }
    root.innerHTML = `<div class="modal-overlay" data-modal-overlay><div class="modal" style="max-width:680px;">
      <div class="modal-head"><h2>${escText(site.name)} — ${type}</h2><button class="close" data-modal-close>×</button></div>
      <div class="modal-body" style="display:block;">${body}</div>
      <div class="modal-foot"><button class="btn" data-modal-close>Cancel</button><button class="btn primary" id="cx-save">Apply</button></div>
    </div></div>`;
    const close = () => { root.innerHTML = ''; };
    root.querySelector('[data-modal-overlay]').addEventListener('click', (e) => { if (e.target === e.currentTarget) close(); });
    root.querySelectorAll('[data-modal-close]').forEach(b => b.addEventListener('click', close));

    if (type === 'milestones') {
      $('ms-add')?.addEventListener('click', () => { site[key].push({name:'',target_date:'',status:'',public:false}); openComplexModal(idx,key,type,cols); });
      root.querySelectorAll('[data-mrm]').forEach(b => b.addEventListener('click', (e) => { site[key].splice(parseInt(e.currentTarget.dataset.mrm),1); openComplexModal(idx,key,type,cols); }));
    } else if (type === 'table') {
      $('t-add')?.addEventListener('click', () => { const o={}; JSON.parse(cols).forEach(c=>o[c]=''); site[key].push(o); openComplexModal(idx,key,type,cols); });
      root.querySelectorAll('[data-trm]').forEach(b => b.addEventListener('click', (e) => { site[key].splice(parseInt(e.currentTarget.dataset.trm),1); openComplexModal(idx,key,type,cols); }));
    } else if (type === 'links') {
      $('lk-add')?.addEventListener('click', () => { site[key].push({title:'',url:''}); openComplexModal(idx,key,type,cols); });
      root.querySelectorAll('[data-lrm]').forEach(b => b.addEventListener('click', (e) => { site[key].splice(parseInt(e.currentTarget.dataset.lrm),1); openComplexModal(idx,key,type,cols); }));
    }

    $('cx-save').addEventListener('click', () => {
      if (type === 'milestones') {
        const rows = root.querySelectorAll('.ms-row');
        const arr = [];
        rows.forEach(r => arr.push({
          name: r.querySelector('[data-mk=name]').value,
          target_date: r.querySelector('[data-mk=target_date]').value,
          status: r.querySelector('[data-mk=status]').value,
          public: r.querySelector('[data-mk=public]').checked,
        }));
        site[key] = arr;
      } else if (type === 'study' || type === 'permit') {
        const o = {};
        root.querySelectorAll('[data-sub]').forEach(s => { o[s.dataset.sub] = s.value; });
        site[key] = o;
      } else if (type === 'table') {
        const colArr = JSON.parse(cols);
        const rows = root.querySelectorAll('[data-ri]');
        const arr = [];
        rows.forEach(r => { const o = {}; colArr.forEach(c => o[c] = r.querySelector(`[data-tk="${c}"]`).value); arr.push(o); });
        site[key] = arr;
      } else if (type === 'links') {
        const rows = root.querySelectorAll('.lk-row');
        const arr = [];
        rows.forEach(r => arr.push({
          title: r.querySelector('[data-lk=title]').value,
          url: r.querySelector('[data-lk=url]').value,
        }));
        site[key] = arr.filter(l => l.title || l.url);
      }
      setDirty(true); close(); render();
    });
  }

  document.addEventListener('input', (e) => { if (e.target.closest('#grid [data-key]')) setDirty(true); });
  document.addEventListener('change', (e) => { if (e.target.closest('#grid [data-key]')) setDirty(true); });

  document.addEventListener('click', (e) => {
    const groupRow = e.target.closest('.group-row');
    if (groupRow) {
      const k = groupRow.dataset.group;
      collapsedGroups[k] = !collapsedGroups[k];
      localStorage.setItem('collapsedGroups', JSON.stringify(collapsedGroups));
      readBack(); render();
      return;
    }
    const cx = e.target.closest('[data-complex]');
    if (cx) {
      openComplexModal(parseInt(cx.dataset.cidx), cx.dataset.ckey, cx.dataset.complex, cx.dataset.cols);
      return;
    }
    const img = e.target.closest('[data-img-idx]');
    if (img) {
      const i = parseInt(img.dataset.imgIdx);
      readBack();
      window.openImagePicker({
        folder: 'sites',
        current: data.sites[i].image || '',
        onPick: (filename) => { data.sites[i].image = filename; setDirty(true); render(); }
      });
      return;
    }
    const re = e.target.closest('[data-act]');
    if (re) {
      const i = parseInt(re.dataset.ridx);
      const act = re.dataset.act;
      readBack();
      if (act === 'del') {
        if (!confirm(`Delete ${data.sites[i].name || 'this site'}?`)) return;
        data.sites.splice(i, 1);
      } else if (act === 'up') {
        if (i <= 0) return;
        [data.sites[i-1], data.sites[i]] = [data.sites[i], data.sites[i-1]];
      } else if (act === 'down') {
        if (i >= data.sites.length - 1) return;
        [data.sites[i+1], data.sites[i]] = [data.sites[i], data.sites[i+1]];
      }
      setDirty(true); render();
      return;
    }
    if (e.target.id === 'btn-add') {
      readBack();
      data.sites.push({ id: 'new-' + Date.now(), name: 'New site', country: '', status: 'tbd', published: false, lat: 65, lng: 17 });
      setDirty(true); render();
    }
  });

  function fmtAgo(iso) {
    const dt = new Date(iso);
    const ago = Math.round((Date.now() - dt.getTime()) / 60000);
    if (ago < 1) return 'just now';
    if (ago < 60) return `${ago} min ago`;
    if (ago < 1440) return `${Math.round(ago/60)} h ago`;
    return dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  async function loadMeta() {
    try {
      const r = await fetch('/api/published-meta');
      if (!r.ok) return;
      const m = await r.json();
      const draft = m.sites_draft;
      const pub = m.sites;
      const parts = [];
      if (draft?.at) parts.push(`Draft: ${fmtAgo(draft.at)}${draft.by ? ' by ' + draft.by : ''}`);
      else parts.push('No draft saved');
      if (pub?.at) parts.push(`Published: ${fmtAgo(pub.at)}${pub.by ? ' by ' + pub.by : ''}`);
      else parts.push('Never published');
      $('last-published').textContent = parts.join(' · ');
    } catch {}
  }

  async function load() {
    setStatus('Loading…');
    const [r1, r2] = await Promise.all([fetch('/api/sites'), fetch('/api/sites-schema')]);
    if (!r1.ok || !r2.ok) { setStatus('Load failed', 'err'); return; }
    data = await r1.json();
    schema = await r2.json();
    loadMeta();
    render();
    setDirty(false); setStatus('');
  }

  async function save() {
    readBack();
    setStatus('Saving…');
    const r = await fetch('/api/sites', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    if (!r.ok) { setStatus('Save failed', 'err'); return false; }
    const r2 = await fetch('/api/save/sites', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (!r2.ok) { setStatus('Saved locally; draft commit failed', 'err'); setDirty(false); return true; }
    setDirty(false); setStatus('Saved to draft branch', 'ok');
    renderTotals();
    loadMeta();
    return true;
  }

  async function publish() {
    if (!confirm('Publish sites? Regenerates pipeline pages and pushes to LIVE site (master branch).')) return;
    if (!(await save())) return;
    setStatus('Publishing…');
    const r = await fetch('/api/publish/sites', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: 'CMS publish: sites' }) });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) { setStatus('Publish failed: ' + (body.error || r.status), 'err'); return; }
    setStatus('Published to LIVE — both sites redeploying', 'ok');
    loadMeta();
  }

  $('btn-save').addEventListener('click', save);
  $('btn-publish').addEventListener('click', publish);
  $('btn-reload').addEventListener('click', () => { if (dirty && !confirm('Discard unsaved changes?')) return; load(); });
  window.addEventListener('beforeunload', (e) => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

  load();
})();
</script>
</body>
</html>
