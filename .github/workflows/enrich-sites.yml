name: Re-enrich datacenter data

on:
  schedule:
    - cron: '0 4 1 * *'  # 04:00 UTC, 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: draft
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run enrichment
        run: node scripts/enrich-sites.js
      - name: Regenerate site pages
        run: node server/regen/sites.js
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/sites.json datacenters/ no/datacenters/ scripts/cache/api || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: monthly re-enrichment of datacenter data"
            git push origin draft
          else
            echo "No changes."
          fi
